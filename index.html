<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChefAI Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #09090b; color: white; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); border-top: 1px solid rgba(255,255,255,0.05); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .float-anim { animation: floating 3s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .glow-effect { box-shadow: 0 0 40px -10px rgba(249, 115, 22, 0.5); }
    </style>
</head>
<body class="flex justify-center">
    <div id="root" class="w-full max-w-md h-screen relative shadow-2xl overflow-hidden flex flex-col bg-[#09090b]">
        <div style="text-align:center; padding-top:50px; color:#52525b;">Cargando interfaz Premium...</div>
    </div>

    <script type="text/babel">
        const safeGetStorage = (key) => { try { return localStorage.getItem(key) || ''; } catch(e) { return ''; } };
        const safeSetStorage = (key, val) => { try { localStorage.setItem(key, val); } catch(e) { console.warn("Storage bloqueado"); } };
        const safeRemStorage = (key) => { try { localStorage.removeItem(key); } catch(e) { console.warn("Storage bloqueado"); } };

        const { useState, useEffect } = React;

        const defaultRecipe = {
          title: "Chupe de Mariscos",
          description: "Un plato tradicional chileno, contundente, cremoso y lleno de sabor del mar. Perfecto para reponer energías.",
          basePortions: 4,
          ingredients: [
            { name: "Pan marraqueta", amount: 2, unit: "unidades", replacement: "Pan de molde sin bordes" },
            { name: "Leche entera", amount: 400, unit: "ml", replacement: "Leche descremada o vegetal" },
            { name: "Surtido de mariscos", amount: 500, unit: "g", replacement: "Atún en lata o camarones" },
            { name: "Cebolla", amount: 1, unit: "unidad", replacement: "Cebolla morada o puerro" },
            { name: "Vino blanco", amount: 100, unit: "ml", replacement: "Caldo de pescado" },
            { name: "Queso parmesano", amount: 100, unit: "g", replacement: "Queso mantecoso rallado" },
            { name: "Ají color", amount: 1, unit: "cucharada", replacement: "Pimentón dulce o merkén" }
          ],
          steps: [
            "Desmenuza el pan en un bol y cúbrelo con la leche. Deja remojar hasta que absorba el líquido.",
            "Pica la cebolla en cubos finos. En una olla calienta aceite y sofríe la cebolla junto con el ají color.",
            "Agrega el surtido de mariscos al sofrito y saltea por 2 minutos. Vierte el vino blanco y deja evaporar el alcohol.",
            "Incorpora el pan remojado a la olla. Cocina a fuego lento sin dejar de revolver hasta lograr una crema espesa. Salpimienta a gusto.",
            "Distribuye la mezcla en pocillos de greda y cubre con abundante queso parmesano.",
            "Lleva al horno precalentado a 200°C por 15 minutos o hasta que la superficie esté dorada."
          ],
          apaReferences: [
            "Montecino, S. (2006). La olla deleitosa: Cocinas mestizas de Chile. Editorial Catalonia."
          ]
        };

        function App() {
          const [apiKey, setApiKey] = useState(safeGetStorage('chefai_apikey'));
          const [showKeyModal, setShowKeyModal] = useState(!safeGetStorage('chefai_apikey'));
          
          const [navTab, setNavTab] = useState('home'); 
          const [recipeTab, setRecipeTab] = useState('ingredients');
          
          const [query, setQuery] = useState('');
          const [recipe, setRecipe] = useState(defaultRecipe);
          const [portions, setPortions] = useState(defaultRecipe.basePortions);
          const [removedIngs, setRemovedIngs] = useState(new Set());
          const [favorites, setFavorites] = useState([]);
          
          const [isLoading, setIsLoading] = useState(false);
          const [error, setError] = useState(null);

          const fetchRecipe = async (searchStr) => {
            if (!apiKey) { setShowKeyModal(true); return; }
            setIsLoading(true); setError(null); setRemovedIngs(new Set());
            
            // INSTRUCCIÓN BLINDADA
            const prompt = `Genera una receta de: "${searchStr}". DEVUELVE ÚNICAMENTE UN JSON VÁLIDO. NADA DE TEXTO ANTES NI DESPUÉS, NI SALUDOS. ESTRUCTURA EXACTA: {"title":"Nombre","description":"Descripción","basePortions":4,"ingredients":[{"name":"Ing","amount":100,"unit":"g","replacement":"Sustituto"}],"steps":["Paso 1","Paso 2"],"apaReferences":["Referencia APA"]}`;

            try {
              // AHORA SÍ, VERIFICADO: USA LA RUTA v1 OFICIAL ESTABLE
              const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { temperature: 0.7 } 
                })
              });

              const data = await response.json();
              if (!response.ok) throw new Error(data.error?.message || `Error HTTP: ${response.status}`);
              if (!data.candidates || data.candidates.length === 0) throw new Error("Google bloqueó la respuesta por seguridad.");

              let textResponse = data.candidates[0].content?.parts?.[0]?.text;
              if (!textResponse) throw new Error("La IA no devolvió texto.");
              
              // LIMPIADOR UNIVERSAL
              let cleanJson = textResponse.replace(/```json/gi, '').replace(/```/gi, '').trim();
              
              const parsed = JSON.parse(cleanJson);
              setRecipe(parsed);
              setPortions(parsed.basePortions || 4);
              setNavTab('recipe');
              setRecipeTab('ingredients');
              setQuery('');
            } catch (err) {
              console.error(err);
              if (err.message.includes("API key not valid")) {
                setError("Tu Clave API no es válida o fue revocada por Google.");
                safeRemStorage('chefai_apikey');
                setApiKey('');
              } else {
                setError(`Ups, hubo un problema al leer la receta: ${err.message}. ¡Intenta de nuevo!`);
              }
            } finally {
              setIsLoading(false);
            }
          };

          const handleSaveKey = () => {
            const input = document.getElementById('api_key_input').value.trim();
            if (input) { safeSetStorage('chefai_apikey', input); setApiKey(input); setShowKeyModal(false); }
          };

          return (
            <div className="flex-1 flex flex-col w-full h-full relative">
              {showKeyModal && (
                <div className="absolute inset-0 z-50 bg-black/90 flex items-center justify-center p-5">
                  <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] w-full shadow-2xl fade-in relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-400 to-orange-600"></div>
                    <div className="flex justify-center mb-6 mt-2">
                      <div className="w-20 h-20 bg-orange-500/10 rounded-full flex items-center justify-center glow-effect">
                        <span className="material-icons-round text-4xl text-orange-500">vpn_key</span>
                      </div>
                    </div>
                    <h2 className="text-2xl font-black text-white text-center mb-2">Conexión Segura</h2>
                    <p className="text-zinc-400 text-sm text-center mb-8">Pega tu clave de Google AI Studio para desbloquear todo el poder de ChefAI.</p>
                    <input id="api_key_input" type="password" placeholder="AIzaSy..." className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-2xl p-4 text-white focus:border-orange-500 outline-none mb-6 font-mono text-center tracking-widest" />
                    <button onClick={handleSaveKey} className="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all shadow-lg shadow-orange-500/20">
                      Activar ChefAI
                    </button>
                  </div>
                </div>
              )}

              {isLoading && (
                <div className="absolute inset-0 z-40 bg-zinc-950/90 backdrop-blur-md flex flex-col items-center justify-center fade-in">
                  <div className="relative mb-6 float-anim">
                    <div className="absolute inset-0 bg-orange-500 blur-[30px] opacity-30 rounded-full"></div>
                    <div className="w-24 h-24 bg-gradient-to-br from-zinc-800 to-zinc-900 rounded-[2rem] border border-zinc-700 flex items-center justify-center relative">
                      <span className="material-icons-round text-5xl text-orange-500 animate-pulse">restaurant</span>
                    </div>
                  </div>
                  <h3 className="text-xl font-black text-white tracking-wide mb-2">Diseñando receta...</h3>
                  <p className="text-zinc-500 text-sm font-medium">Buscando los mejores ingredientes</p>
                </div>
              )}

              {navTab !== 'home' && (
                <header className="glass-panel sticky top-0 z-20 px-5 pt-6 pb-4 shrink-0">
                  <div className="flex justify-between items-center mb-5">
                    <h1 className="text-2xl font-black text-white flex items-center gap-2">
                      <span className="material-icons-round text-orange-500">local_fire_department</span> ChefAI
                    </h1>
                    {apiKey && (
                      <button onClick={() => { safeRemStorage('chefai_apikey'); setApiKey(''); setShowKeyModal(true); }} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition-colors">
                        <span className="material-icons-round text-sm">settings</span>
                      </button>
                    )}
                  </div>
                  
                  <form onSubmit={(e) => { e.preventDefault(); if(query) fetchRecipe(query); }} className="relative">
                    <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Ej: Pastel de choclo, Lasaña..." className="w-full bg-zinc-800/80 border border-zinc-700/50 rounded-2xl py-3.5 pl-5 pr-12 text-zinc-100 placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors shadow-inner" />
                    <button type="submit" className="absolute right-2 top-2 bottom-2 w-10 bg-orange-500 rounded-xl flex items-center justify-center hover:bg-orange-600 transition-colors active:scale-90"><span className="material-icons-round text-white">search</span></button>
                  </form>
                </header>
              )}

              <main className="flex-1 overflow-y-auto hide-scrollbar pb-28 relative">
                
                {navTab === 'home' && (
                  <div className="h-full flex flex-col items-center justify-center p-6 fade-in relative">
                    <div className="absolute top-20 right-10 w-32 h-32 bg-orange-600 rounded-full blur-[100px] opacity-20"></div>
                    <div className="absolute bottom-20 left-10 w-40 h-40 bg-orange-500 rounded-full blur-[100px] opacity-10"></div>

                    <div className="relative mb-10 float-anim mt-10">
                      <div className="absolute inset-0 bg-orange-500 blur-[40px] opacity-30 rounded-full"></div>
                      <div className="relative w-36 h-36 rounded-[2.5rem] bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center shadow-2xl shadow-orange-500/20 border border-orange-300/30">
                        <span className="material-icons-round text-7xl text-white">local_fire_department</span>
                      </div>
                    </div>
                    
                    <h1 className="text-4xl font-black text-white mb-3 tracking-tight text-center">
                      ¡Bienvenido!
                    </h1>
                    <p className="text-zinc-400 text-center mb-12 leading-relaxed text-sm px-4">
                      Tu asistente gastronómico inteligente. Descubre, crea y personaliza recetas de todo el mundo con el poder de la IA.
                    </p>

                    <button 
                      onClick={() => setNavTab('explore')} 
                      className="group relative w-full max-w-[280px] bg-white text-zinc-900 font-black py-4 rounded-2xl overflow-hidden active:scale-95 transition-all shadow-xl"
                    >
                      <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-orange-100 to-orange-200 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                      <span className="relative flex items-center justify-center gap-2">
                        EMPEZAR A COCINAR <span className="material-icons-round text-orange-500">arrow_forward</span>
                      </span>
                    </button>
                  </div>
                )}

                {error && navTab !== 'home' && (
                  <div className="m-5 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl flex flex-col gap-2 fade-in">
                    <div className="flex items-center gap-2 text-red-500 font-bold">
                        <span className="material-icons-round">error</span> Error de conexión
                    </div>
                    <p className="text-red-200 text-xs font-mono leading-relaxed">{error}</p>
                  </div>
                )}

                {navTab === 'recipe' && (
                  <div className="fade-in">
                    <div className="px-5 py-6">
                      <div className="flex justify-between items-start gap-4 mb-3">
                        <h2 className="text-3xl font-black text-white leading-tight">{recipe.title}</h2>
                        <button onClick={() => {
                          const isFav = favorites.some(f => f.title === recipe.title);
                          isFav ? setFavorites(favorites.filter(f => f.title !== recipe.title)) : setFavorites([...favorites, recipe]);
                        }} className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 transition-colors ${favorites.some(f => f.title === recipe.title) ? 'bg-orange-500/20 text-orange-500' : 'bg-zinc-800 text-zinc-400'}`}>
                          <span className="material-icons-round">{favorites.some(f => f.title === recipe.title) ? 'favorite' : 'favorite_border'}</span>
                        </button>
                      </div>
                      <p className="text-zinc-400 text-sm leading-relaxed">{recipe.description}</p>
                    </div>

                    <div className="mx-5 mb-8 bg-zinc-900 border border-zinc-800/50 rounded-3xl p-4 flex items-center justify-between shadow-lg">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center"><span className="material-icons-round text-orange-500 text-sm">group</span></div>
                        <span className="font-bold text-zinc-300">Porciones</span>
                      </div>
                      <div className="flex items-center gap-4 bg-zinc-950 rounded-full p-1 border border-zinc-800">
                        <button onClick={() => setPortions(p => Math.max(1, p - 1))} className="w-8 h-8 rounded-full flex items-center justify-center text-zinc-400 hover:text-white transition-colors"><span className="material-icons-round text-sm">remove</span></button>
                        <span className="font-black text-white w-4 text-center">{portions}</span>
                        <button onClick={() => setPortions(p => p + 1)} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-white hover:bg-zinc-700 transition-colors"><span className="material-icons-round text-sm">add</span></button>
                      </div>
                    </div>

                    <div className="flex px-5 mb-6 border-b border-zinc-800">
                      {['ingredients', 'steps', 'refs'].map(tab => (
                        <button key={tab} onClick={() => setRecipeTab(tab)} className={`flex-1 pb-4 text-xs font-bold uppercase tracking-wider border-b-2 transition-colors ${recipeTab === tab ? 'border-orange-500 text-orange-500' : 'border-transparent text-zinc-500'}`}>
                          {tab === 'ingredients' ? 'Ingredientes' : tab === 'steps' ? 'Pasos' : 'Fuentes'}
                        </button>
                      ))}
                    </div>

                    <div className="px-5">
                      {recipeTab === 'ingredients' && (
                        <div className="space-y-3 pb-4 fade-in">
                          {recipe.ingredients && recipe.ingredients.map((ing, idx) => {
                            const isRem = removedIngs.has(idx);
                            const amount = ((ing.amount * portions) / (recipe.basePortions || 4)).toFixed(1).replace('.0', '');
                            return (
                              <div key={idx} className={`p-4 rounded-2xl border transition-all ${isRem ? 'bg-zinc-900/40 border-zinc-800/50' : 'bg-zinc-900 border-zinc-800 shadow-md'}`}>
                                <div className="flex justify-between items-center gap-4">
                                  <div className={`flex-1 ${isRem ? 'opacity-40 line-through' : ''}`}>
                                    <span className="font-black text-orange-400 block mb-1">{amount} {ing.unit}</span>
                                    <span className="text-zinc-200 font-medium">{ing.name}</span>
                                  </div>
                                  <button onClick={() => {
                                    const next = new Set(removedIngs); next.has(idx) ? next.delete(idx) : next.add(idx); setRemovedIngs(next);
                                  }} className={`w-10 h-10 rounded-full flex items-center justify-center transition-colors ${isRem ? 'bg-orange-500/20 text-orange-500' : 'bg-zinc-800 text-zinc-400'}`}>
                                    <span className="material-icons-round text-lg">{isRem ? 'restart_alt' : 'close'}</span>
                                  </button>
                                </div>
                                {isRem && <div className="mt-4 pt-3 border-t border-zinc-800/50 flex gap-2 text-sm text-zinc-400"><span className="material-icons-round text-orange-500 text-base">lightbulb</span><p>Sustituto: <span className="text-zinc-200 font-medium">{ing.replacement || 'No disponible'}</span></p></div>}
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {recipeTab === 'steps' && (
                        <div className="space-y-6 pb-4 fade-in">
                          {recipe.steps && recipe.steps.map((step, idx) => (
                            <div key={idx} className="flex gap-4">
                              <div className="shrink-0 flex flex-col items-center">
                                <span className="w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 text-white font-black flex items-center justify-center text-sm shadow-lg shadow-orange-500/20">{idx + 1}</span>
                                {idx !== recipe.steps.length - 1 && <div className="w-px h-full bg-zinc-800 my-2"></div>}
                              </div>
                              <p className="text-zinc-300 leading-relaxed pb-4 pt-1">{step}</p>
                            </div>
                          ))}
                        </div>
                      )}

                      {recipeTab === 'refs' && (
                        <div className="space-y-4 pb-4 fade-in">
                          {recipe.apaReferences && recipe.apaReferences.length > 0 ? recipe.apaReferences.map((ref, idx) => (
                            <div key={idx} className="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 relative overflow-hidden">
                              <span className="material-icons-round text-zinc-800 text-6xl absolute -top-2 -right-2 opacity-50">format_quote</span>
                              <p className="text-sm text-zinc-400 font-serif border-l-2 border-orange-500 pl-4 relative z-10">{ref}</p>
                            </div>
                          )) : <p className="text-zinc-500 text-sm text-center italic mt-10">No hay fuentes disponibles.</p>}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {navTab === 'explore' && (
                  <div className="p-5 fade-in">
                    <h2 className="text-2xl font-black text-white mb-6">Explorar Mundo</h2>
                    <div className="grid grid-cols-2 gap-4">
                      {[{n:"Asiática", i:"🍜", q:"Plato asiático"}, {n:"Latina", i:"🌮", q:"Plato latinoamericano"}, {n:"Europea", i:"🍝", q:"Plato europeo"}, {n:"Rápida", i:"⏱️", q:"Cena saludable en 15 minutos"}].map(cat => (
                        <button key={cat.n} onClick={() => fetchRecipe(cat.q)} className="bg-zinc-900 border border-zinc-800 p-6 rounded-3xl flex flex-col items-center gap-3 active:scale-95 transition-all hover:border-zinc-700 shadow-lg">
                          <span className="text-4xl drop-shadow-md">{cat.i}</span>
                          <span className="font-bold text-zinc-300">{cat.n}</span>
                        </button>
                      ))}
                    </div>
                    
                    <div className="mt-6 bg-gradient-to-br from-orange-500/10 to-transparent border border-orange-500/20 p-6 rounded-[2rem] relative overflow-hidden">
                      <span className="material-icons-round absolute -right-4 -bottom-4 text-8xl text-orange-500/10">auto_awesome</span>
                      <h3 className="font-bold text-orange-400 mb-2 text-lg relative z-10">Modo Sorpresa</h3>
                      <p className="text-sm text-zinc-400 mb-6 relative z-10">Deja que la IA decida tu cena de hoy.</p>
                      <button onClick={() => fetchRecipe("Sorpréndeme con un plato gourmet fácil y delicioso")} className="w-full bg-zinc-800 text-white font-bold py-4 rounded-xl hover:bg-zinc-700 transition-colors relative z-10 shadow-lg border border-zinc-700">
                        Sorpréndeme
                      </button>
                    </div>
                  </div>
                )}

                {navTab === 'favorites' && (
                  <div className="p-5 fade-in">
                    <h2 className="text-2xl font-black text-white mb-6">Recetas Guardadas</h2>
                    {favorites.length === 0 ? (
                      <div className="text-center py-16">
                        <div className="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mx-auto mb-6">
                          <span className="material-icons-round text-4xl text-zinc-700">bookmark_border</span>
                        </div>
                        <p className="text-zinc-500 font-medium">Aún no tienes recetas favoritas.</p>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {favorites.map((fav, idx) => (
                          <div key={idx} className="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl flex justify-between items-center gap-4 shadow-lg">
                            <div className="flex-1 truncate">
                              <h3 className="font-bold text-white mb-1 truncate text-lg">{fav.title}</h3>
                              <p className="text-xs text-zinc-500 truncate">{fav.description}</p>
                            </div>
                            <button onClick={() => { setRecipe(fav); setPortions(fav.basePortions || 4); setRemovedIngs(new Set()); setNavTab('recipe'); setRecipeTab('ingredients'); }} className="w-12 h-12 bg-zinc-800 rounded-full flex items-center justify-center text-orange-500 shrink-0 shadow-inner">
                              <span className="material-icons-round">play_arrow</span>
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </main>

              <nav className="glass-panel absolute bottom-0 w-full px-6 py-4 flex justify-between items-center pb-6 z-30">
                {[
                  { id: 'home', icon: 'home', label: 'Inicio' },
                  { id: 'explore', icon: 'travel_explore', label: 'Explorar' },
                  { id: 'recipe', icon: 'restaurant_menu', label: 'Cocinar' },
                  { id: 'favorites', icon: 'favorite', label: 'Guardados' }
                ].map(item => (
                  <button key={item.id} onClick={() => setNavTab(item.id)} className={`flex flex-col items-center gap-1.5 transition-colors ${navTab === item.id ? 'text-orange-500' : 'text-zinc-500'}`}>
                    <div className={`w-12 h-8 rounded-full flex items-center justify-center transition-all ${navTab === item.id ? 'bg-orange-500/20' : ''}`}><span className="material-icons-round text-xl">{item.icon}</span></div>
                    <span className="text-[10px] font-bold">{item.label}</span>
                  </button>
                ))}
              </nav>
            </div>
          );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
