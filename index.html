<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecetarioPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultRecipe = {
          title: "Chupe de Mariscos Clásico",
          description: "Un plato contundente, cremoso y lleno de sabor. Ideal para reponer energías.",
          basePortions: 4,
          ingredients: [
            { name: "Pan marraqueta", amount: 2, unit: "unidades", replacement: "Pan de molde o pan rallado." },
            { name: "Leche entera", amount: 400, unit: "ml", replacement: "Leche descremada o crema diluida." },
            { name: "Surtido de mariscos", amount: 500, unit: "g", replacement: "Camarones, choritos enlatados o atún." },
            { name: "Cebolla", amount: 1, unit: "unidad", replacement: "Cebolla morada o cebollín." },
            { name: "Vino blanco", amount: 100, unit: "ml", replacement: "Caldo o agua." },
            { name: "Queso parmesano", amount: 100, unit: "g", replacement: "Queso mantecoso o gouda." },
            { name: "Ají color", amount: 1, unit: "cucharada", replacement: "Merkén o paprika." }
          ],
          steps: [
            "Desmenuza el pan y remoja en la leche.",
            "Pica la cebolla fina. Calienta aceite en una olla y sofríe la cebolla con el ají color.",
            "Agrega los mariscos al sofrito. Vierte el vino blanco y deja evaporar el alcohol (3 min).",
            "Incorpora el pan remojado. Baja el fuego y revuelve hasta espesar. Salpimienta.",
            "Vierte en fuentes aptas para horno y cubre con queso parmesano.",
            "Hornea a 200°C por 15 minutos hasta gratinar. Sirve caliente."
          ],
          apaReferences: [
            "Montecino, S. (2006). La olla deleitosa: Cocinas mestizas de Chile. Catalonia.",
            "Valenzuela, C. (2019). Perfil nutricional de moluscos. Rev Chilena de Nutrición."
          ]
        };

        const exploreContinents = [
          { region: "América", icon: "🌎", color: "bg-emerald-100 border-emerald-200 text-emerald-800", recipes: ["Ceviche Peruano", "Tacos al Pastor", "Asado de Tira Argentino"] },
          { region: "Europa", icon: "🏰", color: "bg-blue-100 border-blue-200 text-blue-800", recipes: ["Paella Valenciana", "Pizza Napolitana", "Fish and Chips"] },
          { region: "Asia", icon: "🏮", color: "bg-red-100 border-red-200 text-red-800", recipes: ["Pad Thai", "Ramen Tonkotsu", "Pollo Tikka Masala"] }
        ];

        function App() {
          // Lógica de API Key guardada en el teléfono
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
          const [showKeyModal, setShowKeyModal] = useState(!localStorage.getItem('gemini_api_key'));

          const [currentScreen, setCurrentScreen] = useState('recipe'); 
          const [query, setQuery] = useState('');
          const [recipe, setRecipe] = useState(defaultRecipe);
          const [targetPortions, setTargetPortions] = useState(defaultRecipe.basePortions);
          const [removedIngredients, setRemovedIngredients] = useState(new Set());
          const [currentStep, setCurrentStep] = useState(0);
          const [activeTab, setActiveTab] = useState('ingredients'); 
          const [isSearching, setIsSearching] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');
          const [favorites, setFavorites] = useState([]);

          const saveApiKey = () => {
            const val = document.getElementById('keyInput').value.trim();
            if(val) {
              localStorage.setItem('gemini_api_key', val);
              setApiKey(val);
              setShowKeyModal(false);
            }
          };

          const fetchRecipe = async (searchQuery) => {
            if (!apiKey) {
              setShowKeyModal(true);
              return;
            }

            setIsSearching(true);
            setErrorMsg('');
            setCurrentStep(0);
            setRemovedIngredients(new Set());
            setActiveTab('ingredients');
            setCurrentScreen('recipe');
            setQuery('');
            
            const systemPrompt = `Eres un chef experto. El usuario pedirá: "${searchQuery}". Tono adulto joven, directo. Genera 2 referencias APA. Da alternativas (replacements) de ingredientes. Responde ESTRICTAMENTE en JSON.`;
            const schema = {
              type: "OBJECT",
              properties: {
                title: { type: "STRING" }, description: { type: "STRING" }, basePortions: { type: "INTEGER" },
                ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" }, replacement: { type: "STRING" } } } },
                steps: { type: "ARRAY", items: { type: "STRING" } }, apaReferences: { type: "ARRAY", items: { type: "STRING" } }
              }, required: ["title", "description", "basePortions", "ingredients", "steps", "apaReferences"]
            };

            const payload = {
              contents: [{ parts: [{ text: `Receta para: ${searchQuery}` }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: { responseMimeType: "application/json", responseSchema: schema }
            };

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
              });
              
              if (!response.ok) {
                if(response.status === 400 || response.status === 403) {
                  localStorage.removeItem('gemini_api_key');
                  setApiKey('');
                  setShowKeyModal(true);
                  throw new Error('Clave API inválida o bloqueada.');
                }
                throw new Error('API Error');
              }
              
              const data = await response.json();
              const parsedRecipe = JSON.parse(data.candidates[0].content.parts[0].text);
              setRecipe(parsedRecipe);
              setTargetPortions(parsedRecipe.basePortions);
            } catch (err) {
              setErrorMsg(err.message === 'Clave API inválida o bloqueada.' ? 'Clave incorrecta o revocada por Google. Ingresa una nueva.' : 'Error de conexión. Intenta de nuevo.');
            }
            setIsSearching(false);
          };

          const handleSearch = (e) => { e.preventDefault(); if (query.trim()) fetchRecipe(query); };
          
          const isFavorite = favorites.some(fav => fav.title === recipe.title);
          const toggleFavorite = () => isFavorite ? setFavorites(favorites.filter(f => f.title !== recipe.title)) : setFavorites([...favorites, recipe]);
          const loadFavorite = (fav) => { setRecipe(fav); setTargetPortions(fav.basePortions); setCurrentStep(0); setRemovedIngredients(new Set()); setActiveTab('ingredients'); setCurrentScreen('recipe'); };

          return (
            <div className="min-h-screen font-sans text-slate-800 flex justify-center bg-slate-100">
              <div className="w-full max-w-md bg-white shadow-2xl flex flex-col relative h-screen overflow-hidden">
                
                {/* MODAL DE API KEY */}
                {showKeyModal && (
                  <div className="absolute inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-6 w-full shadow-2xl border-4 border-orange-100">
                      <div className="flex items-center gap-2 mb-2 text-orange-600">
                        <span className="material-icons">vpn_key</span>
                        <h3 className="text-xl font-bold">Configuración Inicial</h3>
                      </div>
                      <p className="text-slate-600 text-sm mb-5 leading-relaxed">
                        Pega aquí tu clave de Google AI Studio. Se guardará de forma segura <strong>solo en tu teléfono</strong>. Nadie más podrá verla.
                      </p>
                      <input 
                        type="password" 
                        id="keyInput" 
                        placeholder="AIzaSy..." 
                        className="w-full bg-slate-50 border border-slate-300 rounded-xl p-4 mb-4 focus:outline-none focus:ring-2 focus:ring-orange-500" 
                      />
                      <button 
                        onClick={saveApiKey} 
                        className="w-full bg-orange-500 text-white font-bold py-4 rounded-xl active:scale-95 transition-transform shadow-md"
                      >
                        Guardar Clave y Entrar
                      </button>
                    </div>
                  </div>
                )}

                <header className="bg-slate-900 text-white p-4 shadow-md z-10 shrink-0">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-3">
                      <span className="material-icons text-orange-500" style={{fontSize:'28px'}}>local_fire_department</span>
                      <h1 className="text-xl font-bold tracking-tight">RecetarioPro</h1>
                    </div>
                    {apiKey && (
                       <button onClick={() => { localStorage.removeItem('gemini_api_key'); setApiKey(''); setShowKeyModal(true); }} className="text-xs text-slate-400 flex items-center gap-1 bg-slate-800 px-2 py-1 rounded-lg">
                         <span className="material-icons" style={{fontSize:'14px'}}>settings</span> Clave
                       </button>
                    )}
                  </div>
                  <form onSubmit={handleSearch} className="relative">
                    <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Ej: Pad Thai, Pastel de choclo..." disabled={isSearching} className="w-full bg-slate-800 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-500 placeholder-slate-400 text-sm disabled:opacity-50" />
                    <button type="submit" disabled={isSearching} className="absolute right-2 top-1.5 bottom-1.5 bg-orange-500 rounded-lg px-3 flex items-center justify-center">
                      <span className={`material-icons text-white ${isSearching ? 'animate-spin' : ''}`}>{isSearching ? 'autorenew' : 'search'}</span>
                    </button>
                  </form>
                </header>

                {isSearching && (
                  <div className="absolute inset-0 bg-white/90 z-30 flex flex-col items-center justify-center pt-20 backdrop-blur-sm">
                    <span className="material-icons animate-spin text-orange-500 mb-4" style={{fontSize:'40px'}}>autorenew</span>
                    <p className="text-slate-800 font-bold text-lg animate-pulse">Cocinando la receta...</p>
                  </div>
                )}

                {/* VISTA RECETA */}
                {currentScreen === 'recipe' && (
                  <div className="flex-1 overflow-y-auto pb-20 relative">
                    {errorMsg && <div className="m-4 p-4 bg-red-50 border border-red-200 rounded-xl flex gap-3 text-red-700 text-sm"><span className="material-icons">warning</span><p>{errorMsg}</p></div>}
                    <div className="p-5 bg-white border-b border-slate-100">
                      <div className="flex justify-between items-start gap-4 mb-2">
                        <h2 className="text-2xl font-bold text-slate-900 leading-tight">{recipe.title}</h2>
                        <button onClick={toggleFavorite} className={`p-2 rounded-full transition-all ${isFavorite ? 'bg-red-50 text-red-500' : 'bg-slate-50 text-slate-400'}`}>
                          <span className="material-icons">{isFavorite ? 'favorite' : 'favorite_border'}</span>
                        </button>
                      </div>
                      <p className="text-slate-600 text-sm leading-relaxed">{recipe.description}</p>
                    </div>
                    <div className="mx-5 my-4 p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                      <div className="flex items-center gap-2 text-slate-700 font-medium">
                        <span className="material-icons text-orange-500">group</span><span>Porciones</span>
                      </div>
                      <div className="flex items-center gap-4">
                        <button onClick={() => setTargetPortions(p => Math.max(1, p - 1))} className="w-10 h-10 bg-white border border-slate-300 rounded-full flex items-center justify-center active:bg-slate-100"><span className="material-icons">remove</span></button>
                        <span className="text-2xl font-bold w-6 text-center">{targetPortions}</span>
                        <button onClick={() => setTargetPortions(p => p + 1)} className="w-10 h-10 bg-white border border-slate-300 rounded-full flex items-center justify-center active:bg-slate-100"><span className="material-icons">add</span></button>
                      </div>
                    </div>
                    <div className="flex px-5 border-b border-slate-200 sticky top-0 bg-white z-10">
                      <button onClick={() => setActiveTab('ingredients')} className={`flex-1 pb-3 text-sm font-semibold transition-colors ${activeTab === 'ingredients' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-slate-500'}`}>Ingredientes</button>
                      <button onClick={() => setActiveTab('steps')} className={`flex-1 pb-3 text-sm font-semibold transition-colors ${activeTab === 'steps' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-slate-500'}`}>Preparación</button>
                      <button onClick={() => setActiveTab('refs')} className={`flex-1 pb-3 text-sm font-semibold transition-colors ${activeTab === 'refs' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-slate-500'}`}>Fuentes</button>
                    </div>

                    {activeTab === 'ingredients' && (
                      <div className="p-5 space-y-3">
                        {recipe.ingredients.map((ing, idx) => {
                          const isRemoved = removedIngredients.has(idx);
                          const amountStr = ((ing.amount * targetPortions) / recipe.basePortions).toFixed(1).replace('.0', '');
                          return (
                            <div key={idx} className={`p-4 rounded-xl border ${isRemoved ? 'bg-slate-50 border-slate-200' : 'bg-white border-slate-200 shadow-sm'}`}>
                              <div className="flex justify-between items-start gap-4">
                                <div className="flex-1">
                                  <p className={`font-semibold text-lg ${isRemoved ? 'line-through text-slate-400' : 'text-slate-800'}`}>{amountStr} {ing.unit}</p>
                                  <p className={`text-sm ${isRemoved ? 'text-slate-400' : 'text-slate-600'}`}>{ing.name}</p>
                                </div>
                                <button onClick={() => { const newRem = new Set(removedIngredients); newRem.has(idx) ? newRem.delete(idx) : newRem.add(idx); setRemovedIngredients(newRem); }} className={`p-2 rounded-full ${isRemoved ? 'text-blue-500 bg-blue-50' : 'text-slate-400 bg-slate-100 hover:text-red-500'}`}>
                                  <span className="material-icons">{isRemoved ? 'autorenew' : 'cancel'}</span>
                                </button>
                              </div>
                              {isRemoved && (
                                <div className="mt-3 pt-3 border-t border-slate-200 flex gap-2 text-sm text-blue-700 bg-blue-50/50 rounded-lg p-2">
                                  <span className="material-icons text-base">info</span><p><strong>Reemplazo:</strong> {ing.replacement}</p>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {activeTab === 'steps' && (
                      <div className="p-5 flex flex-col h-full">
                        <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 min-h-[300px] flex flex-col">
                          <div className="flex justify-between items-center mb-6">
                            <span className="bg-slate-200 text-slate-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Paso {currentStep + 1} de {recipe.steps.length}</span>
                            <span className="material-icons text-slate-400">restaurant</span>
                          </div>
                          <p className="text-lg text-slate-800 leading-relaxed flex-1">{recipe.steps[currentStep]}</p>
                          <div className="flex justify-between items-center mt-8 pt-4 border-t border-slate-200">
                            <button onClick={() => setCurrentStep(p => Math.max(0, p - 1))} disabled={currentStep === 0} className="p-3 rounded-full bg-white border disabled:opacity-30"><span className="material-icons">chevron_left</span></button>
                            <div className="flex gap-1.5 flex-wrap justify-center max-w-[50%]">
                              {recipe.steps.map((_, i) => <div key={i} className={`h-2 rounded-full ${i === currentStep ? 'w-6 bg-orange-500' : 'w-2 bg-slate-300'}`} />)}
                            </div>
                            <button onClick={() => setCurrentStep(p => Math.min(recipe.steps.length - 1, p + 1))} disabled={currentStep === recipe.steps.length - 1} className="p-3 rounded-full bg-orange-500 text-white disabled:opacity-30"><span className="material-icons">chevron_right</span></button>
                          </div>
                        </div>
                      </div>
                    )}

                    {activeTab === 'refs' && (
                      <div className="p-5">
                        <div className="bg-white border rounded-2xl p-5 space-y-4">
                          <div className="flex items-center gap-2"><span className="material-icons text-orange-500">menu_book</span><h3 className="font-bold text-lg">Fuentes</h3></div>
                          {recipe.apaReferences.map((ref, idx) => <p key={idx} className="text-sm text-slate-600 pl-6 -indent-6 leading-relaxed font-serif">{ref}</p>)}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* VISTA EXPLORAR */}
                {currentScreen === 'explore' && (
                  <div className="flex-1 overflow-y-auto pb-24 bg-slate-50">
                    <div className="p-5 pb-2 bg-white sticky top-0 z-10 border-b border-slate-200 shadow-sm">
                      <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2 mb-1"><span className="material-icons text-orange-500">public</span> Atlas Culinario</h2>
                      <p className="text-slate-600 text-sm">Viaja por el mundo a través de su gastronomía.</p>
                    </div>
                    <div className="p-5 space-y-8">
                      {exploreContinents.map((continent) => (
                        <div key={continent.region} className="space-y-3">
                          <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><span className="text-2xl">{continent.icon}</span> {continent.region}</h3>
                          <div className="flex overflow-x-auto pb-4 gap-3 snap-x hide-scrollbar">
                            {continent.recipes.map((receta) => (
                              <button key={receta} onClick={() => fetchRecipe(receta)} className={`min-w-[160px] max-w-[160px] snap-start flex-none p-4 rounded-2xl border active:scale-95 text-left flex flex-col justify-between h-32 shadow-sm ${continent.color}`}>
                                <span className="material-icons mb-2 opacity-70">place</span><span className="font-bold text-sm leading-tight">{receta}</span>
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* VISTA FAVORITOS */}
                {currentScreen === 'favorites' && (
                  <div className="flex-1 overflow-y-auto pb-24 bg-slate-50 p-5">
                    <h2 className="text-2xl font-bold text-slate-900 flex items-center gap-2 mb-6"><span className="material-icons text-red-500">favorite</span> Mis Favoritos</h2>
                    {favorites.length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-64 text-slate-400 text-center space-y-4">
                        <span className="material-icons opacity-50" style={{fontSize: '48px'}}>restaurant_menu</span>
                        <p>Aún no tienes recetas favoritas.</p>
                        <button onClick={() => setCurrentScreen('explore')} className="mt-4 px-6 py-2 bg-orange-100 text-orange-700 font-bold rounded-full">Explorar</button>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {favorites.map((fav, index) => (
                          <div key={index} className="bg-white p-4 rounded-2xl border shadow-sm flex justify-between">
                            <div className="flex-1 pr-4"><h3 className="font-bold text-slate-800 truncate">{fav.title}</h3></div>
                            <button onClick={() => loadFavorite(fav)} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95">Cocinar</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                <nav className="bg-white border-t border-slate-200 p-3 flex justify-around absolute bottom-0 w-full z-20 pb-5 shrink-0">
                   <button onClick={() => setCurrentScreen('recipe')} className={`flex flex-col items-center w-20 ${currentScreen === 'recipe' ? 'text-orange-500' : 'text-slate-400'}`}><span className="material-icons">restaurant</span><span className="text-[10px] font-bold mt-1">Receta</span></button>
                   <button onClick={() => setCurrentScreen('explore')} className={`flex flex-col items-center w-20 ${currentScreen === 'explore' ? 'text-orange-500' : 'text-slate-400'}`}><span className="material-icons">explore</span><span className="text-[10px] font-bold mt-1">Explorar</span></button>
                   <button onClick={() => setCurrentScreen('favorites')} className={`flex flex-col items-center w-20 relative ${currentScreen === 'favorites' ? 'text-red-500' : 'text-slate-400'}`}><span className="material-icons">{currentScreen === 'favorites' ? 'favorite' : 'favorite_border'}</span>{favorites.length > 0 && <span className="absolute top-0 right-4 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>}<span className="text-[10px] font-bold mt-1">Favoritos</span></button>
                </nav>
              </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
