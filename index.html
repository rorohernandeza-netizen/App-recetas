<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecetarioPro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const defaultRecipe = {
          title: "Chupe de Mariscos Clásico",
          description: "Un plato contundente, cremoso y lleno de sabor. Ideal para reponer energías.",
          basePortions: 4,
          ingredients: [
            { name: "Pan marraqueta (o batido)", amount: 2, unit: "unidades", replacement: "Pan de molde o pan rallado." },
            { name: "Leche entera", amount: 400, unit: "ml", replacement: "Leche descremada o crema diluida." },
            { name: "Surtido de mariscos", amount: 500, unit: "g", replacement: "Camarones, choritos enlatados o atún." },
            { name: "Cebolla", amount: 1, unit: "unidad", replacement: "Cebolla morada o cebollín." },
            { name: "Vino blanco", amount: 100, unit: "ml", replacement: "Caldo o agua." },
            { name: "Queso parmesano", amount: 100, unit: "g", replacement: "Queso mantecoso o gouda." },
            { name: "Ají color", amount: 1, unit: "cucharada", replacement: "Merkén o paprika." }
          ],
          steps: [
            "Desmenuza el pan y remoja en la leche.",
            "Pica la cebolla fina. Calienta aceite en una olla y sofríe la cebolla con el ají color.",
            "Agrega los mariscos al sofrito. Vierte el vino blanco y deja evaporar el alcohol (3 min).",
            "Incorpora el pan remojado. Baja el fuego y revuelve hasta espesar. Salpimienta.",
            "Vierte en fuentes aptas para horno y cubre con queso parmesano.",
            "Hornea a 200°C por 15 minutos hasta gratinar. Sirve caliente."
          ],
          apaReferences: [
            "Montecino, S. (2006). La olla deleitosa: Cocinas mestizas de Chile. Catalonia.",
            "Valenzuela, C. (2019). Perfil nutricional de moluscos. Rev Chilena de Nutrición."
          ]
        };

        const exploreContinents = [
          { region: "América", icon: "🌎", color: "bg-emerald-100 border-emerald-200 text-emerald-800", recipes: ["Ceviche Peruano", "Tacos al Pastor", "Asado de Tira Argentino"] },
          { region: "Europa", icon: "🏰", color: "bg-blue-100 border-blue-200 text-blue-800", recipes: ["Paella Valenciana", "Pizza Napolitana", "Fish and Chips"] },
          { region: "Asia", icon: "🏮", color: "bg-red-100 border-red-200 text-red-800", recipes: ["Pad Thai", "Ramen Tonkotsu", "Pollo Tikka Masala"] }
        ];

        function App() {
          const [currentScreen, setCurrentScreen] = useState('recipe'); 
          const [query, setQuery] = useState('');
          const [recipe, setRecipe] = useState(defaultRecipe);
          const [targetPortions, setTargetPortions] = useState(defaultRecipe.basePortions);
          const [removedIngredients, setRemovedIngredients] = useState(new Set());
          const [currentStep, setCurrentStep] = useState(0);
          const [activeTab, setActiveTab] = useState('ingredients'); 
          const [isSearching, setIsSearching] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');
          const [favorites, setFavorites] = useState([]);

          const fetchRecipe = async (searchQuery) => {
            setIsSearching(true);
            setErrorMsg('');
            setCurrentStep(0);
            setRemovedIngredients(new Set());
            setActiveTab('ingredients');
            setCurrentScreen('recipe');
            setQuery('');

            // ---> AQUÍ VA TU CLAVE: REEMPLAZA EL TEXTO ADENTRO DE LAS COMILLAS <---
            const apiKey = "AIzaSyBl9BSUB7Ac8BeTgViwPwescK_WSak_yZo"; 
            
            const systemPrompt = `Eres un chef experto. El usuario pedirá: "${searchQuery}". Tono adulto joven, directo. Genera 2 referencias APA. Da alternativas (replacements) de ingredientes. Responde ESTRICTAMENTE en JSON.`;
            const schema = {
              type: "OBJECT",
              properties: {
                title: { type: "STRING" }, description: { type: "STRING" }, basePortions: { type: "INTEGER" },
                ingredients: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, amount: { type: "NUMBER" }, unit: { type: "STRING" }, replacement: { type: "STRING" } } } },
                steps: { type: "ARRAY", items: { type: "STRING" } }, apaReferences: { type: "ARRAY", items: { type: "STRING" } }
              }, required: ["title", "description", "basePortions", "ingredients", "steps", "apaReferences"]
            };

            const payload = {
              contents: [{ parts: [{ text: `Receta para: ${searchQuery}` }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: { responseMimeType: "application/json", responseSchema: schema }
            };

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error('API Error');
              const data = await response.json();
              const parsedRecipe = JSON.parse(data.candidates[0].content.parts[0].text);
              setRecipe(parsedRecipe);
              setTargetPortions(parsedRecipe.basePortions);
            } catch (err) {
              setErrorMsg("Error de conexión. Revisa tu API Key o intenta de nuevo.");
            }
            setIsSearching(false);
          };

          const handleSearch = (e) => { e.preventDefault(); if (query.trim()) fetchRecipe(query); };
          
          const isFavorite = favorites.some(fav => fav.title === recipe.title);
          const toggleFavorite = () => isFavorite ? setFavorites(favorites.filter(f => f.title !== recipe.title)) : setFavorites([...favorites, recipe]);
          const loadFavorite = (fav) => { setRecipe(fav); setTargetPortions(fav.basePortions); setCurrentStep(0); setRemovedIngredients(new Set()); setActiveTab('ingredients'); setCurrentScreen('recipe'); };

          const renderRecipeView = () => (
            <div className="flex-1 overflow-y-auto pb-20 relative">
              {errorMsg && <div className="m-4 p-4 bg-red-50 border border-red-200 rounded-xl flex gap-3 text-red-700 text-sm"><span className="material-icons">warning</span><p>{errorMsg}</p></div>}
              
              <div className="p-5 bg-white border-b border-slate-100">
                <div className="flex justify-between items-start gap-4 mb-2">
                  <h2 className="text-2xl font-bold text-slate-900 leading-tight">{recipe.title}</h2>
                  <button onClick={toggleFavorite} className={`p-2 rounded-full transition-all ${isFavorite ? 'bg-red-50 text-red-500' : 'bg-slate-50 text-slate-400'}`}>
                    <span className="material-icons">{isFavorite ? 'favorite' : 'favorite_border'}</span>
                  </button>
                </div>
                <p className="text-slate-600 text-sm leading-relaxed">{recipe.description}</p>
              </div>

              <div className="mx-5 my-4 p-4 bg-slate-50 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
                <div className="flex items-center gap-2 text-slate-700 font-medium">
                  <span className="material-icons text-orange-500">group</span><span>Porciones</span>
                </div>
                <div className="flex items-center gap-4">
                  <button onClick={() => setTargetPortions(p => Math.max(1, p - 1))} className="w-10 h-10 bg-white border border-slate-300 rounded-full flex items-center justify-center active:bg-slate-100"><span className="material-icons">remove</span></button>
                  <span className="text-2xl font-bold w-6 text-center">{targetPortions}</span>
                  <button onClick={() => setTargetPortions(p => p + 1)} className="w-10 h-10 bg-white border border-slate-300 rounded-full flex items-center justify-center active:bg-slate-100"><span className="material-icons">add</span></button>
                </div>
              </div>

              <div className="flex px-5 border-b border-slate-200 sticky top-0 bg-white z-10">
                <button onClick
