<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecetarioPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
          const [showKeyModal, setShowKeyModal] = useState(!localStorage.getItem('gemini_api_key'));
          const [query, setQuery] = useState('');
          const [recipe, setRecipe] = useState({
            title: "Chupe de Mariscos Clásico",
            description: "Plato cremoso y tradicional chileno.",
            ingredients: [{name: "Pan", amount: 2, unit: "unidades"}]
          });
          const [isSearching, setIsSearching] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');

          const fetchRecipe = async (searchQuery) => {
            setIsSearching(true); setErrorMsg('');
            try {
              // USANDO LA RUTA ESTABLE v1
              const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Dame la receta de ${searchQuery} en formato JSON: {title, description, ingredients:[{name, amount, unit}]}` }] }]
                })
              });
              
              const data = await response.json();
              if (!response.ok) throw new Error(data.error?.message || "Error");
              
              const rawText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
              setRecipe(JSON.parse(rawText));
            } catch (err) {
              setErrorMsg(`Fallo: ${err.message}`);
            }
            setIsSearching(false);
          };

          return (
            <div className="max-w-md mx-auto h-screen flex flex-col bg-white">
              {showKeyModal && (
                <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
                  <div className="bg-white p-6 rounded-2xl w-full">
                    <h3 className="font-bold mb-4 italic">Configura tu Clave</h3>
                    <input id="keyIn" type="password" className="w-full border p-3 rounded-xl mb-4" placeholder="AIzaSy..." />
                    <button onClick={() => {
                      const val = document.getElementById('keyIn').value;
                      localStorage.setItem('gemini_api_key', val);
                      setApiKey(val); setShowKeyModal(false);
                    }} className="w-full bg-orange-500 text-white p-3 rounded-xl font-bold">CONECTAR</button>
                  </div>
                </div>
              )}
              <header className="bg-slate-900 p-4 text-white shrink-0">
                <div className="flex justify-between items-center mb-4">
                  <span className="font-bold text-orange-500 flex items-center gap-1">
                    <span className="material-icons">local_fire_department</span> RecetarioPro
                  </span>
                  <button onClick={() => setShowKeyModal(true)} className="text-[10px] opacity-50">CLAVE</button>
                </div>
                <form onSubmit={(e) => {e.preventDefault(); fetchRecipe(query);}} className="relative">
                  <input value={query} onChange={e=>setQuery(e.target.value)} className="w-full bg-slate-800 p-3 rounded-xl text-sm outline-none focus:ring-1 focus:ring-orange-500" placeholder="¿Qué quieres cocinar?" />
                  <button className="absolute right-2 top-2 bg-orange-500 p-1.5 rounded-lg"><span className="material-icons text-sm">search</span></button>
                </form>
              </header>
              <main className="flex-1 overflow-y-auto p-5">
                {isSearching && <div className="text-center py-10"><span className="material-icons animate-spin text-orange-500">sync</span><p className="text-xs mt-2">Cocinando receta...</p></div>}
                {errorMsg && <p className="text-red-500 text-[10px] bg-red-50 p-2 rounded mb-4 font-mono">{errorMsg}</p>}
                <h2 className="text-2xl font-bold mb-1">{recipe.title}</h2>
                <p className="text-slate-500 text-sm mb-6">{recipe.description}</p>
                <div className="space-y-4">
                  <h3 className="font-bold border-b pb-2 text-xs text-slate-400 uppercase tracking-widest">Ingredientes</h3>
                  {recipe.ingredients && recipe.ingredients.map((ing, i) => (
                    <div key={i} className="flex justify-between text-sm border-b border-slate-50 pb-2">
                      <span>{ing.name}</span>
                      <span className="font-bold text-orange-600">{ing.amount} {ing.unit}</span>
                    </div>
                  ))}
                </div>
              </main>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
