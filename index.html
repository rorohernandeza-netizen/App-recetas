<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecetarioPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
          const [showKeyModal, setShowKeyModal] = useState(!localStorage.getItem('gemini_api_key'));
          const [query, setQuery] = useState('');
          const [recipe, setRecipe] = useState({
            title: "Chupe de Mariscos Clásico",
            description: "Plato cremoso y tradicional chileno.",
            basePortions: 4,
            ingredients: [{name: "Pan", amount: 2, unit: "unidades", replacement: "Pan de molde"}],
            steps: ["Remojar el pan en leche.", "Sofreír cebolla.", "Mezclar y hornear."],
            apaReferences: ["Montecino, S. (2006)."]
          });
          const [isSearching, setIsSearching] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');

          const fetchRecipe = async (searchQuery) => {
            setIsSearching(true); setErrorMsg('');
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `Receta de ${searchQuery}. Responde solo JSON: {title, description, basePortions:4, ingredients:[{name, amount, unit, replacement}], steps:[], apaReferences:[]}` }] }]
                })
              });
              
              const data = await response.json();
              if (!response.ok) {
                throw new Error(data.error?.message || `Error ${response.status}`);
              }
              
              const rawText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
              setRecipe(JSON.parse(rawText));
            } catch (err) {
              setErrorMsg(`Fallo: ${err.message}`);
            }
            setIsSearching(false);
          };

          return (
            <div className="max-w-md mx-auto h-screen flex flex-col bg-white">
              {showKeyModal && (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6">
                  <div className="bg-white p-6 rounded-2xl w-full">
                    <h3 className="font-bold mb-4">Ingresa tu API Key</h3>
                    <input id="keyIn" type="password" className="w-full border p-3 rounded-xl mb-4" placeholder="AIzaSy..." />
                    <button onClick={() => {
                      const val = document.getElementById('keyIn').value;
                      localStorage.setItem('gemini_api_key', val);
                      setApiKey(val); setShowKeyModal(false);
                    }} className="w-full bg-orange-500 text-white p-3 rounded-xl font-bold">Guardar</button>
                  </div>
                </div>
              )}
              <header className="bg-slate-900 p-4 text-white">
                <div className="flex justify-between items-center mb-4">
                  <span className="font-bold">RecetarioPro</span>
                  <button onClick={() => setShowKeyModal(true)} className="text-[10px] opacity-50 uppercase">Clave</button>
                </div>
                <form onSubmit={(e) => {e.preventDefault(); fetchRecipe(query);}} className="relative">
                  <input value={query} onChange={e=>setQuery(e.target.value)} className="w-full bg-slate-800 p-3 rounded-xl text-sm" placeholder="Ej: Pizza..." />
                  <button className="absolute right-2 top-2 bg-orange-500 p-1.5 rounded-lg"><span className="material-icons text-sm">search</span></button>
                </form>
              </header>
              <main className="flex-1 overflow-y-auto p-5 pb-20">
                {isSearching && <p className="text-center animate-pulse">Cocinando...</p>}
                {errorMsg && <p className="text-red-500 text-xs bg-red-50 p-3 rounded-lg mb-4 border border-red-200 font-mono">{errorMsg}</p>}
                <h2 className="text-2xl font-bold">{recipe.title}</h2>
                <p className="text-slate-500 text-sm mb-6">{recipe.description}</p>
                <div className="space-y-4">
                  <h3 className="font-bold border-b pb-2">Ingredientes</h3>
                  {recipe.ingredients.map((ing, i) => (
                    <div key={i} className="flex justify-between text-sm border-b border-slate-50 pb-2">
                      <span>{ing.name}</span>
                      <span className="font-bold text-orange-600">{ing.amount} {ing.unit}</span>
                    </div>
                  ))}
                </div>
              </main>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
